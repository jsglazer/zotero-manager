version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # Pinned to the plugin's minAppVersion; bumping it breaks `npm ci`
      # (peer conflict), so don't auto-PR it.
      - dependency-name: obsidian
      # Hold ESLint at 9.x: eslint-plugin-obsidianmd@0.3.0 still pins
      # @eslint/js ^9.30.1 and isn't ESLint-10-ready. Forcing eslint 10 breaks
      # typed linting (projectService can't load the TS program -> hundreds of
      # spurious no-unsafe-* errors). Revisit when obsidianmd supports ESLint 10.
      - dependency-name: eslint
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/js'
        update-types: ['version-update:semver-major']
      - dependency-name: '@eslint/json'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
