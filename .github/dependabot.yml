version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # Pinned to the plugin's minAppVersion; bumping it breaks `npm ci`
      # (peer conflict), so don't auto-PR it.
      - dependency-name: obsidian
      # ESLint 10 trio (eslint / @eslint/js / @eslint/json) adopted 2026-06-15.
      # eslint-plugin-obsidianmd@0.3.0 runs clean under eslint 10 at runtime;
      # the only friction was peer caps in three bundled plugins
      # (@microsoft/eslint-plugin-sdl, eslint-plugin-import, eslint-plugin-react),
      # resolved via the package.json `overrides` block. No longer held.

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
